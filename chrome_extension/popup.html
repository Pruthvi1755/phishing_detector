<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>PhishGuard</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@400;600&family=Space+Grotesk:wght@500;700&display=swap');

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      width: 340px;
      font-family: 'Space Grotesk', sans-serif;
      background: #020817;
      color: #fff;
      padding: 0;
    }

    .nav {
      display: flex;
      align-items: center;
      gap: 10px;
      padding: 14px 16px;
      border-bottom: 1px solid rgba(255,255,255,0.05);
    }

    .logo-icon {
      width: 28px; height: 28px;
      background: rgba(0,255,136,0.1);
      border: 1px solid rgba(0,255,136,0.25);
      border-radius: 6px;
      display: flex; align-items: center; justify-content: center;
      font-size: 14px;
    }

    .logo-text { font-weight: 700; font-size: 15px; }
    .logo-text span { color: #00ff88; }

    .badge {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 8px;
      color: rgba(0,255,136,0.5);
      border: 1px solid rgba(0,255,136,0.15);
      border-radius: 20px;
      padding: 2px 7px;
      letter-spacing: 0.1em;
    }

    .main { padding: 16px; }

    .url-box {
      background: rgba(13,21,38,0.8);
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 8px;
      padding: 10px 12px;
      margin-bottom: 12px;
    }

    .url-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 9px;
      color: rgba(255,255,255,0.3);
      letter-spacing: 0.1em;
      margin-bottom: 4px;
    }

    #url-text {
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: rgba(255,255,255,0.55);
      word-break: break-all;
      line-height: 1.5;
    }

    #scan-btn {
      width: 100%;
      padding: 12px;
      background: #00ff88;
      color: #020817;
      border: none;
      border-radius: 8px;
      font-family: 'Space Grotesk', sans-serif;
      font-weight: 700;
      font-size: 13px;
      letter-spacing: 0.08em;
      cursor: pointer;
      transition: background 0.2s;
    }

    #scan-btn:hover  { background: #00e07a; }
    #scan-btn:active { transform: scale(0.98); }
    #scan-btn:disabled { background: rgba(0,255,136,0.15); color: rgba(0,255,136,0.3); cursor: not-allowed; }

    #result {
      margin-top: 12px;
      padding: 14px;
      border-radius: 8px;
      display: none;
      animation: fadeUp 0.3s ease both;
    }

    #result.SAFE       { background: rgba(0,255,136,0.07);  border: 1px solid rgba(0,255,136,0.25); }
    #result.SUSPICIOUS { background: rgba(255,179,71,0.07); border: 1px solid rgba(255,179,71,0.25); }
    #result.PHISHING   { background: rgba(255,59,92,0.07);  border: 1px solid rgba(255,59,92,0.25); }

    .result-header { display: flex; align-items: center; gap: 8px; margin-bottom: 8px; }

    .result-emoji  { font-size: 20px; }

    .result-status {
      font-weight: 700;
      font-size: 16px;
      letter-spacing: 0.05em;
    }

    .SAFE       .result-status { color: #00ff88; }
    .SUSPICIOUS .result-status { color: #ffb347; }
    .PHISHING   .result-status { color: #ff3b5c; }

    .result-score {
      margin-left: auto;
      font-family: 'JetBrains Mono', monospace;
      font-size: 11px;
      color: rgba(255,255,255,0.4);
    }

    .result-bar-wrap {
      height: 4px;
      background: rgba(255,255,255,0.05);
      border-radius: 4px;
      overflow: hidden;
      margin-bottom: 8px;
    }

    .result-bar {
      height: 100%;
      border-radius: 4px;
      transition: width 1s ease;
    }

    .SAFE       .result-bar { background: #00ff88; }
    .SUSPICIOUS .result-bar { background: #ffb347; }
    .PHISHING   .result-bar { background: #ff3b5c; }

    .result-explanation {
      font-size: 11px;
      color: rgba(255,255,255,0.6);
      line-height: 1.5;
    }

    .error-box {
      margin-top: 12px;
      padding: 10px 12px;
      background: rgba(255,59,92,0.07);
      border: 1px solid rgba(255,59,92,0.2);
      border-radius: 8px;
      font-family: 'JetBrains Mono', monospace;
      font-size: 10px;
      color: #ff3b5c;
      display: none;
    }

    @keyframes fadeUp {
      from { opacity: 0; transform: translateY(8px); }
      to   { opacity: 1; transform: translateY(0); }
    }
  </style>
</head>
<body>
  <div class="nav">
    <div class="logo-icon">⚡</div>
    <span class="logo-text">Phish<span>Guard</span></span>
    <span class="badge" id="status-badge">READY</span>
  </div>

  <div class="main">
    <div class="url-box">
      <div class="url-label">CURRENT PAGE</div>
      <div id="url-text">Loading…</div>
    </div>

    <button id="scan-btn">🔍 Scan This Page</button>

    <div id="result">
      <div class="result-header">
        <span class="result-emoji" id="result-emoji"></span>
        <span class="result-status" id="result-status"></span>
        <span class="result-score" id="result-score"></span>
      </div>
      <div class="result-bar-wrap">
        <div class="result-bar" id="result-bar" style="width:0%"></div>
      </div>
      <p class="result-explanation" id="result-explanation"></p>
    </div>

    <div class="error-box" id="error-box"></div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
